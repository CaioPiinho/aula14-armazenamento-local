<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloco de Anotações Pessoal - LocalStorage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 800px;
      width: 100%;
    }

    h1 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 2em;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 300px;
      padding: 15px;
      font-size: 16px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      border: 2px solid #ddd;
      border-radius: 10px;
      resize: vertical;
      transition: border-color 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .button-group {
      margin-top: 20px;
      display: flex;
      gap: 15px;
    }

    button {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .btn-save {
      background: #667eea;
      color: white;
    }

    .btn-clear {
      background: #f44336;
      color: white;
    }

    .feedback {
      margin-top: 20px;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }

    .feedback-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .feedback-info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    footer {
      margin-top: 30px;
      text-align: center;
      color: #999;
      font-size: 14px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>📝 Bloco de Anotações Pessoal</h1>
    <div class="subtitle">Suas anotações são salvas automaticamente no LocalStorage</div>

    <textarea id="anotacao" placeholder="Digite sua anotação aqui..."></textarea>

    <div class="button-group">
      <button class="btn-save" onclick="salvarAnotacao()">💾 Salvar anotação</button>
      <button class="btn-clear" onclick="limparAnotacao()">🗑️ Limpar anotação</button>
    </div>

    <div id="feedback" class="feedback"></div>

    <footer>
      <strong>Por que LocalStorage?</strong> Ideal para dados que precisam persistir mesmo após fechar o navegador, como rascunhos e lembretes pessoais.
    </footer>
  </div>

  <script>
    const CHAVE_ANOTACAO = "minhaAnotacao";
    const textarea = document.getElementById("anotacao");
    const feedbackDiv = document.getElementById("feedback");

    function mostrarFeedback(mensagem, tipo) {
      feedbackDiv.textContent = mensagem;
      feedbackDiv.className = `feedback feedback-${tipo}`;
      setTimeout(() => {
        if (feedbackDiv.textContent === mensagem) {
          feedbackDiv.style.opacity = "0";
          setTimeout(() => {
            feedbackDiv.textContent = "";
            feedbackDiv.style.opacity = "1";
            feedbackDiv.className = "feedback";
          }, 300);
        }
      }, 3000);
    }

    function salvarAnotacao() {
      const texto = textarea.value;
      if (texto.trim() === "") {
        mostrarFeedback("⚠️ Digite algo antes de salvar!", "info");
        return;
      }

      localStorage.setItem(CHAVE_ANOTACAO, texto);
      mostrarFeedback("✅ Anotação salva com sucesso!", "success");
    }

    function limparAnotacao() {
      textarea.value = "";
      localStorage.removeItem(CHAVE_ANOTACAO);
      mostrarFeedback("🗑️ Anotação removida!", "success");
    }

    function carregarAnotacao() {
      const anotacaoSalva = localStorage.getItem(CHAVE_ANOTACAO);
      if (anotacaoSalva) {
        textarea.value = anotacaoSalva;
        mostrarFeedback("📖 Anotação carregada!", "success");
      } else {
        mostrarFeedback("ℹ️ Nenhuma anotação salva ainda", "info");
      }
    }

    carregarAnotacao();
  </script>
</body>

</html>
