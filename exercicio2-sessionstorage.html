<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho de Compras - SessionStorage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      color: #f5576c;
      margin-bottom: 10px;
      font-size: 2em;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      border-bottom: 2px solid #f5576c;
      padding-bottom: 10px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #f5576c;
    }

    button {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .btn-add {
      background: #f5576c;
      color: white;
    }

    .btn-clear {
      background: #ff9800;
      color: white;
      width: 100%;
      margin-top: 20px;
    }

    .cart-info {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .counter {
      font-size: 18px;
      font-weight: bold;
      color: #f5576c;
    }

    .cart-items {
      list-style: none;
      margin-top: 20px;
    }

    .cart-item {
      background: #f8f9fa;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }

    .cart-item:hover {
      background: #e9ecef;
    }

    .item-name {
      font-size: 16px;
      font-weight: 500;
    }

    .btn-remove {
      background: #dc3545;
      color: white;
      padding: 5px 12px;
      font-size: 12px;
    }

    .empty-message {
      text-align: center;
      color: #999;
      padding: 20px;
      font-style: italic;
    }

    .feedback {
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }

    .feedback-success {
      background: #d4edda;
      color: #155724;
    }

    .feedback-error {
      background: #f8d7da;
      color: #721c24;
    }

    footer {
      margin-top: 30px;
      text-align: center;
      color: #999;
      font-size: 14px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🛒 Carrinho de Compras</h1>
    <div class="subtitle">Carrinho salvo apenas durante a sessão</div>

    <div class="input-group">
      <input type="text" id="produtoInput" placeholder="Nome do produto" maxlength="50">
      <button class="btn-add" onclick="adicionarProduto()">➕ Adicionar</button>
    </div>

    <div class="cart-info">
      <span>📦 Itens no carrinho:</span>
      <span class="counter" id="contador">0 produto(s)</span>
    </div>

    <ul id="listaCarrinho" class="cart-items"></ul>

    <button class="btn-clear" onclick="esvaziarCarrinho()">🗑️ Esvaziar carrinho</button>

    <div id="feedback" class="feedback"></div>

    <footer>
      <strong>Por que SessionStorage?</strong> Ideal para dados temporários como carrinho de compras, que devem ser limpos ao fechar a aba.
    </footer>
  </div>

  <script>
    const CHAVE_CARRINHO = "carrinho";
    let produtos = [];

    function mostrarFeedback(mensagem, tipo) {
      const feedbackDiv = document.getElementById("feedback");
      feedbackDiv.textContent = mensagem;
      feedbackDiv.className = `feedback feedback-${tipo}`;
      setTimeout(() => {
        if (feedbackDiv.textContent === mensagem) {
          feedbackDiv.style.opacity = "0";
          setTimeout(() => {
            feedbackDiv.textContent = "";
            feedbackDiv.style.opacity = "1";
            feedbackDiv.className = "feedback";
          }, 300);
        }
      }, 2000);
    }

    function salvarCarrinho() {
      sessionStorage.setItem(CHAVE_CARRINHO, JSON.stringify(produtos));
    }

    function carregarCarrinho() {
      const carrinhoSalvo = sessionStorage.getItem(CHAVE_CARRINHO);
      if (carrinhoSalvo) {
        produtos = JSON.parse(carrinhoSalvo);
      } else {
        produtos = [];
      }
      atualizarInterface();
    }

    function atualizarInterface() {
      const lista = document.getElementById("listaCarrinho");
      const contador = document.getElementById("contador");

      if (produtos.length === 0) {
        lista.innerHTML = '<div class="empty-message">🛒 Carrinho vazio</div>';
        contador.textContent = "0 produto(s)";
        return;
      }

      contador.textContent = `${produtos.length} produto(s)`;

      lista.innerHTML = "";
      produtos.forEach((produto, index) => {
        const li = document.createElement("li");
        li.className = "cart-item";
        li.innerHTML = `
                    <span class="item-name">📦 ${produto}</span>
                    <button class="btn-remove" onclick="removerProduto(${index})">Remover</button>
                `;
        lista.appendChild(li);
      });
    }

    function adicionarProduto() {
      const input = document.getElementById("produtoInput");
      const nomeProduto = input.value.trim();

      if (nomeProduto === "") {
        mostrarFeedback("⚠️ Digite o nome do produto!", "error");
        return;
      }

      produtos.push(nomeProduto);
      salvarCarrinho();
      atualizarInterface();
      input.value = "";
      mostrarFeedback(`✅ "${nomeProduto}" adicionado ao carrinho!`, "success");
    }

    function removerProduto(index) {
      const produtoRemovido = produtos[index];
      produtos.splice(index, 1);
      salvarCarrinho();
      atualizarInterface();
      mostrarFeedback(`🗑️ "${produtoRemovido}" removido!`, "success");
    }

    function esvaziarCarrinho() {
      if (produtos.length === 0) {
        mostrarFeedback("ℹ️ Carrinho já está vazio!", "error");
        return;
      }

      produtos = [];
      salvarCarrinho();
      atualizarInterface();
      mostrarFeedback("🗑️ Carrinho esvaziado!", "success");
    }

    carregarCarrinho();
  </script>
</body>

</html>
